<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
        }

        video {
            width: 100%;
            height: auto;
            outline: none;
        }

        /* Bottom Link Styling */
        .bottom-link {
            position: absolute;
            bottom: 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #0000ff;
            text-decoration: none; /* Removes underline */
            transition: opacity 0.3s ease;
        }

        .bottom-link:hover {
            opacity: 0.8; /* Subtle feedback on hover */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline controls>
            <source src="neon.webm" type="video/webm">
            Your browser does not support the video tag.
        </video>
    </div>

    <a href="https://services.sd.polyu.edu.hk/neon" class="bottom-link">
        https://services.sd.polyu.edu.hk/neon
    </a>

</body>
</html>
