<script>
let bubbles = [];

function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent('p5-container');
  
  for (let i = 0; i < 4000; i++) {
    bubbles[i] = {
      x: width / 2,
      y: height / 2,
      display: function(size) {
        stroke(0, 0, 255);
        noFill();
        ellipse(this.x, this.y, size, size);
      },
      move: function(speed) {
        this.x += random(-speed, speed);
        this.y += random(-speed, speed);
      }
    };
  }
}

function draw() {
  background(255);
  
  // Map mouse position to speed and size
  let speed = map(mouseX, 0, width, 0.5, 10);
  let size = map(mouseY, 0, height, 5, 60);
  
  for (let i = 0; i < bubbles.length; i++) {
    bubbles[i].move(speed);
    bubbles[i].display(size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

<script>
document.addEventListener('DOMContentLoaded', function () {
  
  // --- A. GLOBAL ELEMENT STYLING ---
  // Applies consistent rounding to media elements
  document.querySelectorAll('img, iframe, .w-node-video').forEach((el) => {
    el.style.borderRadius = '20px';
    el.style.overflow = 'hidden';
  });

  // --- B. IMAGE POPUP LOGIC ---
  const grids = document.querySelectorAll('.pop-image-grid, #pop-image');
  grids.forEach((grid) => {
    grid.addEventListener('click', (event) => {
      const clickedImg = event.target.closest('img');
      if (!clickedImg) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'custom-popup-wrapper';
      const popupImg = document.createElement('img');
      popupImg.src = clickedImg.src;
      popupImg.className = 'popup-content';

      wrapper.appendChild(popupImg);
      document.body.appendChild(wrapper);

      setTimeout(() => wrapper.classList.add('active'), 50);

      wrapper.onclick = () => {
        wrapper.classList.remove('active');
        setTimeout(() => wrapper.remove(), 800);
      };
    });
  });

  // --- C. IFRAME POPUP LOGIC ---
  const restrictedDomains = ['polyu.edu.hk', 'google.com'];
  
  document.addEventListener('click', function (e) {
    const trigger = e.target.closest('#iframe-trigger') || e.target.closest('.js-popup-link');
    if (!trigger) return;

    const targetUrl = trigger.getAttribute('data-url') || trigger.getAttribute('href');
    if (!targetUrl || targetUrl === '#') return;

    // Attribute-based customization
    const customWidth = trigger.getAttribute('data-width') || '80vw';
    const customHeight = trigger.getAttribute('data-height') || '80vh';
    const customBg = trigger.getAttribute('data-bg') || '#000000';

    if (restrictedDomains.some(domain => targetUrl.includes(domain))) {
      window.open(targetUrl, '_blank');
      return;
    }

    e.preventDefault();

    const wrapper = document.createElement('div');
    wrapper.className = 'custom-popup-wrapper';

    const container = document.createElement('div');
    container.className = 'popup-content';
    
    // Inline styling for the iframe container
    container.style.cssText = `
      width: ${customWidth} !important;
      height: ${customHeight} !important;
      max-width: 95vw !important;
      max-height: 95vh !important;
      background: ${customBg} !important; 
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0px !important; 
      box-sizing: border-box;
      border-radius: 20px !important;
      transform: scale(0.5);
      opacity: 0;
      overflow: hidden;
      border: none !important;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    `;

    container.innerHTML = `

    
<div class="close-popup" style="position:absolute; top:10px; right:10px; width:18px; height:18px; background-color:#0614D7; border-radius:50%; cursor:pointer; z-index:10; transition: transform 0.2s ease;"></div>

      
      <iframe src="${targetUrl}" 
        style="width: calc(100% + 2px); height: calc(100% + 2px); margin: -1px; border:none; border-radius:20px; background:${customBg}; display:block;" 
        frameborder="0" allowfullscreen></iframe>
    `;

    wrapper.appendChild(container);
    document.body.appendChild(wrapper);

    setTimeout(() => {
      wrapper.classList.add('active');
      container.style.transform = 'scale(1)';
      container.style.opacity = '1';
    }, 50);

    const closePopup = () => {
      wrapper.classList.remove('active');
      container.style.transform = 'scale(0.5)';
      container.style.opacity = '0';
      setTimeout(() => wrapper.remove(), 800);
    };

    wrapper.onclick = (ev) => {
      if (ev.target === wrapper || ev.target.className === 'close-popup') {
        closePopup();
      }
    };
  });

  // --- D. RESIZABLE BOX ---
  const resizable = document.getElementById('resizable-box');
  if (resizable) {
    resizable.style.position = 'relative';
    const handle = document.createElement('div');
    handle.style.cssText = 'width:20px; height:100%; position:absolute; right:-10px; top:0; cursor:col-resize; z-index:999;';
    resizable.appendChild(handle);

    let isResizing = false, aspectRatio = 1;

    handle.onmousedown = (e) => {
      isResizing = true;
      aspectRatio = resizable.offsetWidth / resizable.offsetHeight;
      document.body.style.userSelect = 'none';
    };

    window.onmousemove = (e) => {
      if (!isResizing) return;
      const newWidth = e.clientX - resizable.getBoundingClientRect().left;
      if (newWidth > 100) {
        resizable.style.width = newWidth + 'px';
        resizable.style.height = (newWidth / aspectRatio) + 'px';
      }
    };

    window.onmouseup = () => { 
      isResizing = false; 
      document.body.style.userSelect = 'auto'; 
    };
  }
});

// --- E. WEBFLOW VIDEO AUTOPLAY (jQuery Context) ---
var Webflow = Webflow || [];
Webflow.push(function () {
  $('iframe').each(function () {
    var url = $(this).attr('src');
    if (url) {
      var sep = url.indexOf('?') !== -1 ? '&' : '?';
      if (url.includes('vimeo.com')) {
        $(this).attr('src', url + sep + 'autoplay=1&muted=1&loop=1');
      }
      if (url.includes('youtube.com')) {
        var id = url.split('embed/')[1].split('?')[0];
        $(this).attr('src', url + sep + 'autoplay=1&muted=1&loop=1&playlist=' + id);
      }
    }
  });
});
