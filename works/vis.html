<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIS Production Loop</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Black background to match the video */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the whole video is visible without cropping */
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline>
        <source src="vis.m4v" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
