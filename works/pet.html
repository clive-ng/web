<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peticare Gallery</title>
    <style>
        /* Fill the browser window completely with a black background */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container for the images */
        .gallery-container {
            width: 100%;
            /* Box-sizing ensures padding doesn't push the width over 100% */
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 30px padding on all sides (Top, Bottom, Left, Right) */
            padding: 30px; 
        }

        /* Responsive image styling */
        img {
            width: 100%;
            height: auto;
            max-width: 1200px;
            display: block;
            /* 30px gap between stacked images */
            margin-bottom: 30px; 
            border-radius: 20px; /* 20px corner radius */
            border: none;
            /* Subtle dark shadow */
            box-shadow: 0 10px 30px rgba(255,255,255,0.05); 
        }

        /* Remove the bottom margin from the very last image */
        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <img src="peticare09.jpg" alt="">
        <img src="peticare10.jpg" alt="">
        <img src="peticare11.jpg" alt="">
        <img src="peticare01.jpg" alt="">
        <img src="peticare02.jpg" alt="">
        <img src="peticare03.jpg" alt="">
        <img src="peticare04.jpg" alt="">
        <img src="peticare05.jpg" alt="">
        <img src="peticare06.jpg" alt="">
        <img src="peticare07.jpg" alt="">
        <img src="peticare08.jpg" alt="">

    </div>

</body>
</html>
