<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Religions - Auto Scroll</title>
    <style>
        /* Updated background color to #bdbebf and hide scrollbar */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #bdbebf; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            /* Hide scrollbar for IE/Edge/Firefox */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Hide scrollbar for Chrome/Safari */
        body::-webkit-scrollbar {
            display: none;
        }

        .gallery-container {
            width: 100%;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 1100px;
            display: block;
            margin-bottom: 40px; 
            border-radius: 12px;
            border: none;
            box-shadow: none;
            /* Smooth transition if images load or resize */
            transition: transform 0.3s ease-in-out;
        }

        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container" id="gallery">
        <img src="hybrid01.jpg" alt="Hybrid Religions - Superfluous">
        <img src="hybrid02.jpg" alt="Hybrid Religions - Content">
        <img src="hybrid03.jpg" alt="Hybrid Religions - Division Circle">
        <img src="hybrid04.jpg" alt="Hybrid Religions - Comparison Grid">
        <img src="hybrid05.jpg" alt="Hybrid Religions - Eastern and Western">
    </div>

    <script>
        let scrollSpeed = 1; // Adjust this number to change speed
        let isPaused = false;

        // Pause scrolling when mouse is over the images
        const container = document.getElementById('gallery');
        container.addEventListener('mouseenter', () => isPaused = true);
        container.addEventListener('mouseleave', () => isPaused = false);

        function autoScroll() {
            if (!isPaused) {
                window.scrollBy({
                    top: scrollSpeed,
                    left: 0,
                    behavior: 'auto' // 'auto' often works smoother for constant frame-by-frame scrolling
                });
            }

            // Loop back to top if reached the bottom
            if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2) {
                window.scrollTo({ top: 0 });
            }

            requestAnimationFrame(autoScroll);
        }

        // Start the scroll
        autoScroll();
    </script>
</body>
</html>
