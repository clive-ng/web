<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <style>
        /* Setup base layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Container for the video */
        .video-container {
            width: 90%;
            max-width: 1200px;
            margin-top: 30px; 
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            flex-grow: 1; 
            align-items: center;
        }

        video {
            width: 100%;
            max-height: calc(100vh - 120px);
            height: auto;
            outline: none;
            /* Ensures controls are always interactive */
            pointer-events: auto; 
        }

        /* Bottom Link Styling */
        .bottom-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #0000ff;
            text-decoration: none;
            padding-bottom: 30px;
            /* Hover effect removed here */
        }

        /* Ensure link doesn't disappear if window is tiny */
        @media (max-height: 400px) {
            body { overflow-y: auto; }
            .video-container { flex-grow: 0; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline controls>
            <source src="neon.webm" type="video/webm">
            Your browser does not support the video tag.
        </video>
    </div>

    <a href="https://services.sd.polyu.edu.hk/neon" 
       class="bottom-link" 
       target="_blank" 
       rel="noopener">
        https://services.sd.polyu.edu.hk/neon
    </a>

</body>
</html>
