  <script>
    (function() {
      window.addEventListener("load", function() {
        const percentEl = document.getElementById("loader-percent");
        const wrapper = document.querySelector(".loader-wrapper");
        let count = 0;
        const interval = setInterval(() => {
          count += Math.floor(Math.random() * 15) + 5;
          if (count >= 100) {
            count = 100; clearInterval(interval);
            setTimeout(() => { wrapper.classList.add("loader-hidden"); }, 300);
          }
          percentEl.innerText = count + "%";
        }, 50);
      });
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Popup Logic
      const grids = document.querySelectorAll('.pop-image-grid, #pop-image');
      grids.forEach(grid => {
        grid.addEventListener('click', (e) => {
          const img = e.target.closest('img');
          if (!img) return;
          const wrapper = document.createElement('div');
          wrapper.className = 'custom-popup-wrapper';
          wrapper.innerHTML = `<img src="${img.src}" class="popup-content">`;
          document.body.appendChild(wrapper);
          setTimeout(() => wrapper.style.display = 'flex', 10);
          wrapper.onclick = () => wrapper.remove();
        });
      });
    });
  </script>
