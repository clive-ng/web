              <script>
let bubbles = [];
function setup() {
  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent('p5-container');
  for (let i = 0; i < 4000; i++) {
    bubbles[i] = {
      x: width / 2,
      y: height / 2,
      display: function(size) {
        stroke(0, 0, 255);
        noFill();
        ellipse(this.x, this.y, size, size);
      },
      move: function(speed) {
        this.x += random(-speed, speed);
        this.y += random(-speed, speed);
      }
    };
  }
}
function draw() {
  background(255);
  // Map mouse position to speed and size
  let speed = map(mouseX, 0, width, 0.5, 10);
  let size = map(mouseY, 0, height, 5, 60);
  for (let i = 0; i < bubbles.length; i++) {
    bubbles[i].move(speed);
    bubbles[i].display(size);
  }
}
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

  <script>
document.addEventListener("DOMContentLoaded", function() {
  // 1. Find the unique grid container
  const grid = document.getElementById('pop-image');
  if (grid) {
    // Better UX: add a pointer cursor to grid children
    grid.style.cursor = 'pointer';
    // 2. Listen for clicks on the ENTIRE grid
    grid.addEventListener('click', function(event) {
      // 3. CRITICAL CHANGE: Check if what was clicked is an IMG
      if (event.target.tagName === 'IMG') {
        // 4. Extract the source only from that specific image
        const clickedImage = event.target;
        const imgSrc = clickedImage.src;
        // -- The popup logic remains the same --
        // A. Create the dark wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'custom-popup-wrapper';
        wrapper.style.display = 'flex';
        // B. Create the image inside
        const popupImg = document.createElement('img');
        popupImg.src = imgSrc; // Uses the unique clicked source
        popupImg.className = 'popup-content';
        // C. Add to page
        wrapper.appendChild(popupImg);
        document.body.appendChild(wrapper);
        // D. Create the close button
        const closeBtn = document.createElement('div');
        closeBtn.className = 'close-btn';
        closeBtn.textContent = 'X';
        wrapper.appendChild(closeBtn);
        // E. Close on click
        wrapper.addEventListener('click', function(e) {
          wrapper.remove();
        });
      }
    });
  }
});
</script>
