<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Guide</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .gallery-container {
            width: 100%;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 1100px;
            display: block;
            margin-bottom: 40px; 
            border-radius: 12px;
            transition: transform 0.3s ease-in-out;
        }

        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container" id="gallery">
        <img src="r01.jpg" alt="Image 01">
        <img src="r02.jpg" alt="Image 02">
        <img src="r03.jpg" alt="Image 03">
        <img src="r04.jpg" alt="Image 04">
        <img src="r05.jpg" alt="Image 05">
        <img src="r06.jpg" alt="Image 06">
        <img src="r07.jpg" alt="Image 07">
        <img src="r08.jpg" alt="Image 08">
        <img src="r09.jpg" alt="Image 09">
    </div>

    <script>
        // 1. Set your speed (Higher = Faster)
        let scrollSpeed = 1; 

        function autoScroll() {
            // 2. Perform the scroll
            window.scrollBy(0, scrollSpeed);

            // 3. Loop back to top logic
            if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2) {
                window.scrollTo(0, 0);
            }

            // 4. Smooth recursive call
            requestAnimationFrame(autoScroll);
        }

        // Initialize on load
        window.onload = autoScroll;
    </script>
</body>
</html>
