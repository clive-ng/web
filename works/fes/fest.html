<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Sequence Animation - Full Screen</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            /* Height determines how "long" the scroll lasts */
            height: 500vh; 
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            /* We handle the "cover" logic inside the JS draw function */
        }
    </style>

    <style>
    body {
        margin: 0;
        background-color: #111;
        font-family: sans-serif;
        height: 500vh; /* Determines scroll duration */
        
        /* Hide scrollbar for IE, Edge and Firefox */
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    body::-webkit-scrollbar {
        display: none;
    }

    html {
        /* Ensure the hide carries over to the root */
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    html::-webkit-webkit-scrollbar {
        display: none;
    }

    .canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }
</style>
    
</head>
<body>

    <div class="canvas-container">
        <canvas id="sequence-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("sequence-canvas");
        const context = canvas.getContext("2d");
        const html = document.documentElement;

        const frameCount = 300;
        const currentFrame = index => (
            `./ezgif-frame-${index.toString().padStart(3, '0')}.jpg`
        );

        const images = [];
        const sequence = { frame: 0 };

        // Preload images
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            images.push(img);
        }

        // Handle Resizing
        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }

        window.addEventListener('resize', updateCanvasSize);

        images[0].onload = () => {
            updateCanvasSize();
        };

        function render() {
            const img = images[sequence.frame];
            if (!img || !img.complete) return;

            // Logic for "Cover" (fully occupy screen)
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            
            let drawWidth, drawHeight, offsetX, offsetY;

            if (canvasRatio > imgRatio) {
                // Canvas is wider than image (crop top/bottom)
                drawWidth = canvas.width;
                drawHeight = canvas.width / imgRatio;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            } else {
                // Canvas is taller than image (crop sides)
                drawWidth = canvas.height * imgRatio;
                drawHeight = canvas.height;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            }

            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        }

        function easeOutQuad(t) {
            return t * (2 - t);
        }

        window.addEventListener("scroll", () => {
            const scrollTop = html.scrollTop;
            const maxScrollTop = html.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScrollTop;
            
            const easedFraction = easeOutQuad(scrollFraction);

            const frameIndex = Math.min(
                frameCount - 1,
                Math.floor(easedFraction * frameCount)
            );

            sequence.frame = frameIndex;
            requestAnimationFrame(render);
        });
    </script>
</body>
</html>
