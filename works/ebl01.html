<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation with Controls</title>
    <style>
        /* Ensures the slide fills the entire browser window */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQQAt49IA3AwJkTIjRwkToNM96xUU5zQ4-VHldAQohbTUB2kIOwBfVvwaXjnLfe2AzCWfk_dw_r2dvo/pubembed?start=false&loop=false&delayms=3000&rm=demo" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

</body>
</html>
