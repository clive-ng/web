<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival of Hong Kong | Physics Paper Effect</title>
    <style>
        body { margin: 0; background-color: #CFD0CE; overflow: hidden; font-family: sans-serif; }
        #instructions {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: #333; opacity: 0.6;
            pointer-events: none; text-transform: uppercase; font-size: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- <div id="instructions">Drag quickly to see the paper bend</div> -->

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#CFD0CE');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.NoToneMapping;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        const frontTex = loader.load('hkf01.jpg');
        const backTex = loader.load('hkf02.jpg');
        frontTex.colorSpace = THREE.SRGBColorSpace;
        backTex.colorSpace = THREE.SRGBColorSpace;
        backTex.center.set(0.5, 0.5);
        backTex.repeat.set(-1, 1);

        // --- SHADER FOR PAPER BENDING ---
        const vertexShader = `
            varying vec2 vUv;
            uniform float uBend;
            void main() {
                vUv = uv;
                vec3 pos = position;
                // Bend the corners based on drag velocity
                // This creates a cylindrical curve effect
                float dist = length(uv - 0.5);
                pos.z += sin(uv.x * 3.14159) * uBend * dist;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform sampler2D uTexture;
            void main() {
                gl_FragColor = texture2D(uTexture, vUv);
            }
        `;

        const frontMat = new THREE.ShaderMaterial({
            uniforms: { uTexture: { value: frontTex }, uBend: { value: 0 } },
            vertexShader, fragmentShader, side: THREE.FrontSide
        });

        const backMat = new THREE.ShaderMaterial({
            uniforms: { uTexture: { value: backTex }, uBend: { value: 0 } },
            vertexShader, fragmentShader, side: THREE.BackSide
        });

        // Use high-segment geometry so it has "joints" to bend
        const geometry = new THREE.PlaneGeometry(3.2, 4.5, 32, 32);
        const posterGroup = new THREE.Group();

        const frontPlane = new THREE.Mesh(geometry, frontMat);
        const backPlane = new THREE.Mesh(geometry, backMat);
        
        posterGroup.add(frontPlane);
        posterGroup.add(backPlane);
        scene.add(posterGroup);

        camera.position.z = 8;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        // --- VELOCITY TRACKING ---
        let lastRotationY = 0;
        let velocity = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Calculate how fast the poster is rotating
            const currentRotationY = controls.getAzimuthalAngle();
            const delta = currentRotationY - lastRotationY;
            
            // Normalize the delta and apply "lag" for physics feel
            velocity += (delta - velocity) * 0.1;
            lastRotationY = currentRotationY;

            // Apply the bend based on velocity
            // We limit the bend so it doesn't look like rubber
            const bendAmount = THREE.MathUtils.clamp(velocity * 1.5, -0.4, 0.4);
            frontMat.uniforms.uBend.value = bendAmount;
            backMat.uniforms.uBend.value = -bendAmount;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
