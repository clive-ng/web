<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Aid Guide</title>
    <style>
        /* Pure white background and hide scrollbar for IE/Edge/Firefox */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Container for the images */
        .gallery-container {
            width: 100%;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Responsive image styling with no shadow */
        img {
            width: 100%;
            height: auto;
            max-width: 1100px;
            display: block;
            margin-bottom: 40px; 
            border-radius: 12px;
            border: none;
            box-shadow: none; /* Removed all shadows */
        }

        /* Remove the bottom margin from the very last image */
        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <img src="fa01.jpg" alt="First Aid Principle and Victim Assessment">
        <img src="fa02.jpg" alt="Victim Assessment and Vital Signs">
        <img src="fa03.jpg" alt="ABCDE Assessment Method">

        <img src="fa04.jpg" alt="Suffocation and Choking">
        <img src="fa05.jpg" alt="Choking Causes and Symptoms">
        <img src="fa06.jpg" alt="Choking Treatment Flowchart">

        <img src="fa07.jpg" alt="Wounds and Bandaging">
        <img src="fa09.jpg" alt="Wound Care and Dressings">
        <img src="fa08.jpg" alt="Bandaging Techniques">
    </div>

</body>
</html>
