<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
    let bubbles = [];

    function setup() {
        // Use windowWidth/Height so it fills the iframe exactly
        createCanvas(windowWidth, windowHeight);
        
        for (let i = 0; i < 4000; i++) {
            bubbles[i] = {
                // We use functions for x and y so they can be re-centered
                x: width / 2,
                y: height / 2,
                display: function(size) {
                    stroke(0, 0, 255);
                    noFill();
                    ellipse(this.x, this.y, size, size);
                },
                move: function(speed) {
                    this.x += random(-speed, speed);
                    this.y += random(-speed, speed);
                }
            };
        }
    }

    function draw() {
        background(255);
        
        let speed = map(mouseX, 0, width, 0.5, 10);
        let size = map(mouseY, 0, height, 5, 60);
        
        for (let i = 0; i < bubbles.length; i++) {
            bubbles[i].move(speed);
            bubbles[i].display(size);
        }
    }

    // This is the secret sauce for Webflow/Iframes
    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        // Optional: Re-center existing bubbles if the window changes
        for (let b of bubbles) {
            b.x = width / 2;
            b.y = height / 2;
        }
    }
    </script>
</body>
</html>
