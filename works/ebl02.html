<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Presentation</title>
    <style>
        /* Fill the browser window completely */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Responsive Iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://docs.google.com/presentation/d/e/2PACX-1vTE08j_GGGyH3de0s0N4tevAyVxXP4KHgdaB86CuKoJ7glaki42rBk1IErJj-GkZco_CR83ma28cHZ8/embed?start=false&loop=false&delayms=3000&rm=demo" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

</body>
</html>
