  <style>
    :root {
      --primary-blue: #0000FF;
      --overlay-bg: rgba(0, 0, 0, 0.9);
      --radius: 20px;
    }

    /* --- PAGE LOADER --- */
    #page-loader {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000; transition: opacity 0.5s ease, visibility 0.5s;
    }
    .loader-spinner {
      width: 50px; height: 50px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 800 800' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='400' cy='400' r='400' fill='%230000FF'/%3E%3Ccircle cx='400' cy='400' r='333' fill='none' stroke='white' stroke-width='20'/%3E%3Ccircle cx='300' cy='300' r='35' fill='white'/%3E%3Ccircle cx='500' cy='300' r='35' fill='white'/%3E%3C/svg%3E") no-repeat center;
      background-size: contain; animation: spin 1.5s linear infinite;
    }
    #loader-percentage { font-family: 'Montserrat', sans-serif; color: var(--primary-blue); margin-top: 15px; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-hidden { opacity: 0; visibility: hidden; }

    /* --- CUSTOM POPUP (Images & iFrames) --- */
    .popup-overlay {
      position: fixed; inset: 0; background: var(--overlay-bg);
      display: flex; justify-content: center; align-items: center;
      z-index: 99999; opacity: 0; pointer-events: none;
      backdrop-filter: blur(15px); transition: opacity 0.4s ease;
    }
    .popup-overlay.active { opacity: 1; pointer-events: auto; }
    
    .popup-container { 
      max-width: 90%; max-height: 85%; position: relative;
      transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }
    .popup-overlay.active .popup-container { transform: scale(1); }
    
    .popup-content-img { width: auto; height: auto; max-width: 100%; max-height: 85vh; border-radius: var(--radius); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .popup-close { position: absolute; top: -40px; right: 0; color: #fff; font-size: 35px; cursor: pointer; font-family: sans-serif; }

    /* --- UI ELEMENTS --- */
    .w-slider-dot {
      background: var(--primary-blue) !important;
      width: 12px !important; height: 12px !important;
      opacity: 0.3; transition: 0.3s;
    }
    .w-slider-dot.w-active { opacity: 1; transform: scale(1.2); }
    .w-slider-dot div { display: none !important; }
    
    img { border-radius: var(--radius); transition: transform 0.3s ease; }
    .pop-image-grid img:hover { transform: translateY(-5px); cursor: zoom-in; }

    /* Blue Duotone Filter */
    .blue-image { filter: grayscale(100%) sepia(100%) hue-rotate(190deg) saturate(300%); transition: 0.4s; }
    .blue-image:hover { filter: none; }
  </style>
</head>
