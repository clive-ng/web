        <div class="slide playground"id="p5-container" style="width: 100%; height: 100vh; position: relative; overflow: hidden;">
          <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

          <script>
            // Using 'new p5' (Instance Mode) is best for embeds to avoid 
            // conflicts with other scripts on the host page.
            const sketch = (p) => {
              let bubbles = [];
              let totalBubbles = 1500; // Reduced from 4000 for smoother performance

              p.setup = () => {
                let container = document.getElementById('p5-container');
                let canvas = p.createCanvas(container.offsetWidth, container.offsetHeight);
                canvas.parent('p5-container');

                for (let i = 0; i < totalBubbles; i++) {
                  bubbles[i] = {
                    x: p.width / 2,
                    y: p.height / 2,
                    display: function (size) {
                      p.stroke(0, 0, 255, 150); // Added slight transparency
                      p.noFill();
                      p.ellipse(this.x, this.y, size, size);
                    },
                    move: function (speed) {
                      this.x += p.random(-speed, speed);
                      this.y += p.random(-speed, speed);

                      // Keep bubbles within bounds
                      if (this.x < 0) this.x = p.width;
                      if (this.x > p.width) this.x = 0;
                      if (this.y < 0) this.y = p.height;
                      if (this.y > p.height) this.y = 0;
                    }
                  };
                }
              };

              p.draw = () => {
                p.background(255);

                // Default to center if mouse is not on screen
                let mX = p.mouseX > 0 ? p.mouseX : p.width / 2;
                let mY = p.mouseY > 0 ? p.mouseY : p.height / 2;

                let speed = p.map(mX, 0, p.width, 0.5, 10);
                let size = p.map(mY, 0, p.height, 5, 60);

                for (let i = 0; i < bubbles.length; i++) {
                  bubbles[i].move(speed);
                  bubbles[i].display(size);
                }
              };

              p.windowResized = () => {
                let container = document.getElementById('p5-container');
                p.resizeCanvas(container.offsetWidth, container.offsetHeight);
              };
            };

            // Initialize the sketch
            new p5(sketch);
          </script>
        </div>
