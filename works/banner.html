<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Scrolling Banner</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            overflow: hidden; /* Keeps the page clean while the container scrolls */
        }

        .banner-view-window {
            width: 100%;
            height: 600px;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
        }

        .banner-image {
            height: 600px;
            width: auto;
            display: block;
            
            /* Animation Logic */
            animation: scroll-right 60s ease-in-out infinite alternate;
            /* 60s = Duration (Higher is slower)
               ease-in-out = Smooth start and smooth stop
               infinite = Loops forever
               alternate = Moves right, then moves back left smoothly
            */
        }

        @keyframes scroll-right {
            from {
                transform: translateX(0%);
            }
            to {
                /* Moves the image left by its own width, 
                   minus the 100% width of the screen so it stops at the edge */
                transform: translateX(calc(-100% + 100vw));
            }
        }

        /* Pause animation on hover so people can read specific parts */
        .banner-view-window:hover .banner-image {
            animation-play-state: paused;
            cursor: pointer;
        }

        /* Custom Scrollbar for manual navigation */
        .banner-view-window::-webkit-scrollbar {
            height: 10px;
        }
        .banner-view-window::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="banner-view-window">
        <img src="longbanner.jpg" alt="Project Banner" class="banner-image">
    </div>

</body>
</html>
