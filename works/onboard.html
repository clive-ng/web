<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboard01 - Responsive Viewer</title>
    <style>
        /* The background color from your image (#F1F1F1) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #F1F1F1; 
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* The Wrapper: 
           - width: 100% makes it expand to the edges.
           - aspect-ratio forces the height to grow as the width grows.
        */
        .pdf-wrapper {
            width: 100%;
            max-width: 100%; 
            /* 16/9 is standard for landscape slides. 
               This ensures the 'slide' gets bigger as the window widens. */
            aspect-ratio: 16 / 9; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="pdf-wrapper">
        <iframe 
            src="Onboard01.pdf#toolbar=0&navpanes=0&view=Fit" 
            title="Onboard01 Slides">
        </iframe>
    </div>

</body>
</html>
