<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival of Hong Kong 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #instructions {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: white; opacity: 0.4;
            pointer-events: none; text-transform: uppercase; font-size: 10px;
        }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- IMPROVED TEXTURE LOADING ---
        const manager = new THREE.LoadingManager();
        manager.onLoad = () => console.log('Textures loaded successfully!');
        manager.onError = (url) => console.error('Error loading:', url);

        const loader = new THREE.TextureLoader(manager);
        
        // Use your local filenames - Make sure they are in the SAME folder
        const frontTex = loader.load('hkf01.jpg');
        const backTex = loader.load('hkf02.jpg');

        // High quality settings
        [frontTex, backTex].forEach(t => {
            t.anisotropy = renderer.capabilities.getMaxAnisotropy();
            t.colorSpace = THREE.SRGBColorSpace;
        });

        backTex.center.set(0.5, 0.5);
        backTex.repeat.set(-1, 1); // Flip back text so it is readable

        // --- POSTER ---
        const geometry = new THREE.BoxGeometry(3.2, 4.5, 0.05);
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0x222222 }), // sides
            new THREE.MeshStandardMaterial({ color: 0x222222 }), 
            new THREE.MeshStandardMaterial({ color: 0x222222 }), 
            new THREE.MeshStandardMaterial({ color: 0x222222 }), 
            new THREE.MeshStandardMaterial({ map: frontTex, roughness: 0.8 }), // Front
            new THREE.MeshStandardMaterial({ map: backTex, roughness: 0.8 })   // Back
        ];

        const poster = new THREE.Mesh(geometry, materials);
        scene.add(poster);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 10);
        scene.add(light);

        camera.position.z = 8;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
