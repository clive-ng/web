<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Image Renamer & Resizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
            background: #f8fbff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cce5ff;
        }
        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #0056b3;
        }
        .input-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .drop-zone {
            margin: 20px 0;
            padding: 40px 20px;
            border: 2px dashed #007bff;
            border-radius: 8px;
            background-color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone.dragover {
            background-color: #e2efff;
            border-color: #0056b3;
            border-style: solid;
        }
        .drop-zone p { margin: 0 0 10px 0; font-size: 16px; color: #555; pointer-events: none; }
        input[type="file"] { display: none; }
        .browse-btn {
            background-color: #6c757d;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            pointer-events: none;
        }
        .download-all-btn {
            display: none;
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            width: 100%;
            max-width: 400px;
        }
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .image-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .image-card img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .download-btn {
            background-color: #007bff;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .file-name {
            font-size: 12px;
            color: #d32f2f;
            margin-bottom: 10px;
            word-break: break-all;
            font-weight: bold;
        }
        .dim-badge {
            font-size: 10px;
            color: #666;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Live Image Renamer & Resizer</h2>
        <p>Images wider than 1920px will be scaled down. Aspect ratio preserved.</p>
        
        <div class="input-group">
            <label for="custom-name">Set New Base Name</label>
            <input type="text" id="custom-name" placeholder="Enter name (e.g. Vacation)...">
        </div>

        <div id="drop-zone" class="drop-zone">
            <p>Drag and drop images here</p>
            <p>— or —</p>
            <button class="browse-btn">Browse Files</button>
            <input type="file" id="upload" accept="image/*" multiple>
        </div>
        
        <button id="download-all-btn" class="download-all-btn">Download All as ZIP</button>
        <div id="results"></div>
    </div>

    <script>
        const uploadInput = document.getElementById('upload');
        const resultsContainer = document.getElementById('results');
        const dropZone = document.getElementById('drop-zone');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const customNameInput = document.getElementById('custom-name');
        
        let processedImagesForZip = [];

        customNameInput.addEventListener('input', updateNames);

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });

        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        dropZone.addEventListener('click', () => uploadInput.click());
        uploadInput.addEventListener('change', (e) => { handleFiles(e.target.files); e.target.value = null; });

        function handleFiles(files) {
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                if (!file.type.match('image.*')) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1920;
                        let targetWidth = img.width;
                        let targetHeight = img.height;

                        // Resizing Logic
                        if (img.width > MAX_WIDTH) {
                            const scaleFactor = MAX_WIDTH / img.width;
                            targetWidth = MAX_WIDTH;
                            targetHeight = img.height * scaleFactor;
                        }

                        canvas.width = targetWidth;
                        canvas.height = targetHeight;
                        
                        const ctx = canvas.getContext('2d');
                        // Use better image smoothing for resizing
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

                        const dataUrl = canvas.toDataURL(file.type, 0.92);
                        const base64Data = dataUrl.split(',')[1];
                        const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                        const ext = file.name.split('.').pop();

                        createImageCard(dataUrl, nameWithoutExt, ext, Math.round(targetWidth), Math.round(targetHeight));
                        
                        processedImagesForZip.push({
                            origName: nameWithoutExt, 
                            data: base64Data,
                            extension: ext,
                            currentName: ''
                        });

                        updateNames();
                        downloadAllBtn.style.display = 'block';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function createImageCard(dataUrl, origName, ext, w, h) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.dataset.origName = origName; 
            card.dataset.ext = ext;

            const preview = document.createElement('img');
            preview.src = dataUrl;

            const nameLabel = document.createElement('div');
            nameLabel.className = 'file-name';

            const dimLabel = document.createElement('div');
            dimLabel.className = 'dim-badge';
            dimLabel.textContent = `${w} x ${h} px`;

            const downloadLink = document.createElement('a');
            downloadLink.className = 'download-btn';
            downloadLink.href = dataUrl;
            downloadLink.textContent = `Download`;

            card.appendChild(preview);
            card.appendChild(dimLabel);
            card.appendChild(nameLabel);
            card.appendChild(downloadLink);
            resultsContainer.appendChild(card);
        }

        function updateNames() {
            const baseName = customNameInput.value.trim();
            const cards = document.querySelectorAll('.image-card');
            
            cards.forEach((card, index) => {
                const nameLabel = card.querySelector('.file-name');
                const downloadBtn = card.querySelector('.download-btn');
                const origName = card.dataset.origName;
                const ext = card.dataset.ext;
                
                let finalFileName = baseName !== "" ? `${baseName}-${index + 1}.${ext}` : `${origName}.${ext}`;
                
                nameLabel.textContent = finalFileName;
                downloadBtn.download = finalFileName;
                
                if (processedImagesForZip[index]) {
                    processedImagesForZip[index].currentName = finalFileName;
                }
            });
        }

        downloadAllBtn.addEventListener('click', function() {
            const zip = new JSZip();
            processedImagesForZip.forEach(file => {
                zip.file(file.currentName, file.data, {base64: true});
            });

            zip.generateAsync({type:"blob"}).then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Resized_Images.zip";
                a.click();
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>
</html>
