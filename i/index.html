<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side-by-Side Image Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='8' ry='8' stroke='%23CBD5E1FF' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            transition: all 0.2s ease;
        }
        .drag-over {
            background-color: #f1f5f9;
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='8' ry='8' stroke='%233b82f6' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e") !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-slate-800">Side-by-Side Image Merger</h1>
            <p class="text-slate-500">Drag images into the boxes. Sequential naming starts from 0215.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-700">Left Image (Part A)</label>
                <div id="dropzoneA" class="relative group dashed-border rounded-xl bg-white h-64 overflow-hidden" 
                     ondragover="handleDragOver(event, 'A')" 
                     ondragleave="handleDragLeave(event, 'A')" 
                     ondrop="handleDrop(event, 'A')">
                    
                    <input type="file" id="inputA" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleUpload('A')">
                    
                    <div id="previewA-container" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 transition-all pointer-events-none">
                        <i data-lucide="image-plus" class="w-10 h-10 text-slate-400 mb-3"></i>
                        <p class="text-sm text-slate-500 font-medium">Click or Drag Image Here</p>
                        <p id="filenameA" class="text-xs text-slate-400 mt-1 truncate max-w-[200px] opacity-0">filename.jpg</p>
                    </div>
                    
                    <img id="previewA-img" class="absolute inset-0 w-full h-full object-contain rounded-xl bg-slate-100 hidden pointer-events-none" />
                    <button id="clearA" onclick="clearImage('A')" class="absolute top-2 right-2 bg-white/90 p-1.5 rounded-full shadow-sm hover:bg-red-50 hover:text-red-500 transition-all hidden z-20">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-700">Right Image (Part B)</label>
                <div id="dropzoneB" class="relative group dashed-border rounded-xl bg-white h-64 overflow-hidden"
                     ondragover="handleDragOver(event, 'B')" 
                     ondragleave="handleDragLeave(event, 'B')" 
                     ondrop="handleDrop(event, 'B')">
                    
                    <input type="file" id="inputB" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleUpload('B')">
                    
                    <div id="previewB-container" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 transition-all pointer-events-none">
                        <i data-lucide="image-plus" class="w-10 h-10 text-slate-400 mb-3"></i>
                        <p class="text-sm text-slate-500 font-medium">Click or Drag Image Here</p>
                        <p id="filenameB" class="text-xs text-slate-400 mt-1 truncate max-w-[200px] opacity-0">filename.jpg</p>
                    </div>
                    
                    <img id="previewB-img" class="absolute inset-0 w-full h-full object-contain rounded-xl bg-slate-100 hidden pointer-events-none" />
                    <button id="clearB" onclick="clearImage('B')" class="absolute top-2 right-2 bg-white/90 p-1.5 rounded-full shadow-sm hover:bg-red-50 hover:text-red-500 transition-all hidden z-20">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-slate-100 pb-6">
                <div class="flex items-center space-x-4">
                   <label class="flex items-center space-x-2 text-sm text-slate-600 cursor-pointer select-none">
                        <input type="checkbox" id="matchHeight" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked onchange="mergeImages()">
                        <span>Auto-scale height</span>
                   </label>
                   <div class="flex items-center space-x-2">
                       <span class="text-xs font-semibold text-slate-500 uppercase">Start From:</span>
                       <input type="number" id="startNumber" value="215" class="w-20 px-2 py-1 border border-slate-300 rounded text-sm" onchange="updateCounter(this.value)">
                   </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="resetAll()" class="px-5 py-2.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition-all flex items-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                    </button>
                    <button onclick="mergeImages()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-lg text-sm transition-colors flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Preview
                    </button>
                </div>
            </div>

            <div id="resultContainer" class="hidden space-y-4">
                <div class="flex flex-col items-center space-y-2">
                    <div class="relative w-full overflow-hidden bg-slate-100 rounded-lg border border-slate-200 flex justify-center p-2">
                         <canvas id="mergeCanvas" class="max-w-full h-auto shadow-sm"></canvas>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 items-end justify-between pt-2">
                    <div class="w-full sm:w-64 space-y-1">
                        <label class="text-xs font-semibold text-slate-500 uppercase">Output Filename</label>
                        <div class="flex items-center relative">
                            <input type="text" id="outputFilename" class="w-full pl-3 pr-10 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <span class="absolute right-3 text-slate-400 text-xs">.jpg</span>
                        </div>
                    </div>
                    <button onclick="downloadImage()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-medium text-sm shadow-sm transition-colors flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Download & Next
                    </button>
                </div>
            </div>
            
            <div id="emptyState" class="text-center py-12 text-slate-400">
                <p>Drag or upload both images to merge.</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let imageA = null, imageB = null;
        let fileA = null, fileB = null;
        let currentCounter = 215;

        // --- Drag and Drop Handlers ---
        function handleDragOver(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.add('drag-over');
        }

        function handleDragLeave(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.remove('drag-over');
        }

        function handleDrop(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.remove('drag-over');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const input = document.getElementById(`input${side}`);
                // Manually assign the file to the input and trigger logic
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(files[0]);
                input.files = dataTransfer.files;
                handleUpload(side);
            }
        }

        function updateCounter(val) {
            currentCounter = parseInt(val) || 0;
            if (imageA && imageB) determineFilename();
        }

        function handleUpload(side) {
            const input = document.getElementById(`input${side}`);
            const file = input.files[0];
            if (!file) return;

            if (side === 'A') fileA = file; else fileB = file;

            document.getElementById(`filename${side}`).textContent = file.name;
            document.getElementById(`filename${side}`).classList.remove('opacity-0');

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (side === 'A') imageA = img; else imageB = img;

                    const previewImg = document.getElementById(`preview${side}-img`);
                    previewImg.src = e.target.result;
                    previewImg.classList.remove('hidden');
                    
                    document.getElementById(`preview${side}-container`).classList.add('opacity-0');
                    document.getElementById(`clear${side}`).classList.remove('hidden');

                    if (imageA && imageB) {
                        determineFilename();
                        mergeImages();
                    }
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function clearImage(side) {
            document.getElementById(`input${side}`).value = "";
            if (side === 'A') { imageA = null; fileA = null; } else { imageB = null; fileB = null; }

            document.getElementById(`preview${side}-img`).classList.add('hidden');
            document.getElementById(`preview${side}-container`).classList.remove('opacity-0');
            document.getElementById(`filename${side}`).classList.add('opacity-0');
            document.getElementById(`clear${side}`).classList.add('hidden');

            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
        }

        function determineFilename() {
            const paddedNumber = currentCounter.toString().padStart(4, '0');
            document.getElementById('outputFilename').value = paddedNumber;
        }

        function mergeImages() {
            if (!imageA || !imageB) return;
            const canvas = document.getElementById('mergeCanvas');
            const ctx = canvas.getContext('2d');
            const matchHeight = document.getElementById('matchHeight').checked;

            let w1 = imageA.width, h1 = imageA.height;
            let w2 = imageB.width, h2 = imageB.height;

            if (matchHeight) {
                const targetH = Math.max(h1, h2);
                w1 = w1 * (targetH / h1);
                w2 = w2 * (targetH / h2);
                h1 = h2 = targetH;
            }

            canvas.width = w1 + w2;
            canvas.height = Math.max(h1, h2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imageA, 0, 0, w1, h1);
            ctx.drawImage(imageB, w1, 0, w2, h2);

            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
        }

        function downloadImage() {
            const canvas = document.getElementById('mergeCanvas');
            let filename = document.getElementById('outputFilename').value || "merged";
            const fullFilename = filename.toLowerCase().endsWith('.jpg') ? filename : filename + ".jpg";

            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/jpeg", 0.95);
            link.download = fullFilename;
            link.click();

            currentCounter++;
            document.getElementById('startNumber').value = currentCounter;
            determineFilename();
        }

        function resetAll() {
            clearImage('A'); clearImage('B');
            currentCounter = 215;
            document.getElementById('startNumber').value = 215;
            determineFilename();
        }
    </script>
</body>
</html>
