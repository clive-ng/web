<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival of Hong Kong 香港節</title>
    <style>
        /* Fill the browser window completely with a black background */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container for the images */
        .gallery-container {
            width: 100%;
            /* Box-sizing ensures padding doesn't push the width over 100% */
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 30px padding on all sides (Top, Bottom, Left, Right) */
            padding: 30px; 
        }

        /* Responsive image styling */
        img {
            width: 100%;
            height: auto;
            max-width: 1200px;
            display: block;
            /* 30px gap between stacked images */
            margin-bottom: 30px; 
            border-radius: 20px; /* 20px corner radius */
            border: none;
            /* Subtle dark shadow */
            box-shadow: 0 10px 30px rgba(255,255,255,0.05); 
        }

        /* Remove the bottom margin from the very last image */
        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <img src="fhk01.jpg" alt="Gallery Image 1">
        <img src="fhk02.jpg" alt="Gallery Image 2">
        <img src="fhk03.jpg" alt="Gallery Image 3">
        <img src="fhk04.jpg" alt="Gallery Image 4">
        <img src="fhk05.jpg" alt="Gallery Image 5">
        <img src="fhk06.jpg" alt="Gallery Image 6">
        <img src="fhk07.jpg" alt="Gallery Image 7">
        <img src="fhk08.jpg" alt="Gallery Image 8">
        <img src="fhk09.jpg" alt="Gallery Image 9">
        <img src="fhk10.jpg" alt="Gallery Image 10">
        <img src="fhk11.jpg" alt="Gallery Image 11">
    </div>

</body>
</html>
