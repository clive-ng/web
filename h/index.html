<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Scroll Morphing - Robust</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 1000vh; /* Scroll height */
            background-color: #111; /* Dark background so lines pop */
            font-family: sans-serif;
            color: white;
        }

        #svg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Lets you click through it */
        }

        svg {
            width: 80%;
            height: 80%;
            max-width: 800px;
            overflow: visible;
        }

        /* Styling for the morphed SVG line */
        #morph-path {
            fill: none;
            stroke: #00ffcc; /* Cyan stroke */
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* On-screen Debugger */
        .debug-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 100;
        }
    </style>
    <script src="https://unpkg.com/flubber@0.4.2/build/flubber.min.js"></script>
</head>
<body>

    <div class="debug-panel">
        <div><strong>Scroll:</strong> <span id="progress-text">0%</span></div>
        <div><strong>Status:</strong> <span id="status" style="color: #ffaa00;">Initializing...</span></div>
    </div>

    <div id="svg-container">
        <svg id="main-svg" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <path id="morph-path" d=""></path>
        </svg>
    </div>

    <script>
        // Array of your files
        const svgFiles = [
            '01.svg', '02.svg', '03.svg', '04.svg', 
            '05.svg', '06.svg', '07.svg', '08.svg', '01.svg'
        ];

        let parsedSVGs = [];     
        let interpolators = [];  

        async function loadSVGs() {
            try {
                document.getElementById('status').innerText = "Loading SVG files...";
                document.getElementById('status').style.color = "#ffaa00";

                for (let file of svgFiles) {
                    const response = await fetch(file);
                    
                    // Check if file actually exists on the server
                    if (!response.ok) {
                        throw new Error(`Could not find ${file}. Check file names and capitalization!`);
                    }
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, "image/svg+xml");
                    
                    // Find ALL paths and combine their "d" attributes into one massive string
                    const paths = Array.from(doc.querySelectorAll('path'));
                    
                    if (paths.length === 0) {
                        throw new Error(`No <path> tags found in ${file}! You must convert shapes/strokes to paths in Illustrator.`);
                    }

                    const combinedPath = paths.map(p => p.getAttribute('d')).join(' ');
                    parsedSVGs.push(combinedPath);
                }
                
                document.getElementById('status').innerText = "Calculating Morphs...";
                setupInterpolators();

            } catch (error) {
                // Print exact error to the screen
                document.getElementById('status').innerText = "Error: " + error.message;
                document.getElementById('status').style.color = "#ff4444";
                console.error(error);
            }
        }

        function setupInterpolators() {
            try {
                // Set initial shape
                document.getElementById('morph-path').setAttribute('d', parsedSVGs[0]);

                // Create the Flubber transitions
                for (let step = 0; step < parsedSVGs.length - 1; step++) {
                    const morphFunc = flubber.interpolate(parsedSVGs[step], parsedSVGs[step + 1], { maxSegmentLength: 2 });
                    interpolators.push(morphFunc);
                }

                // Success!
                document.getElementById('status').innerText = "Ready! Scroll down.";
                document.getElementById('status').style.color = "#00ffcc";
                
                window.addEventListener('scroll', onScroll);
            } catch (error) {
                document.getElementById('status').innerText = "Morph Math Failed (Check Console)";
                document.getElementById('status').style.color = "#ff4444";
                console.error("Flubber encountered bad path data:", error);
            }
        }

        function onScroll() {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            
            // Prevent dividing by zero if page can't scroll
            if (scrollHeight <= 0) return; 

            const totalProgress = Math.min(1, Math.max(0, scrollTop / scrollHeight));
            document.getElementById('progress-text').innerText = Math.round(totalProgress * 100) + '%';

            const numSegments = interpolators.length;
            const rawSegmentProgress = totalProgress * numSegments;
            
            let currentSegment = Math.floor(rawSegmentProgress);
            if (currentSegment >= numSegments) currentSegment = numSegments - 1; 
            
            let localProgress = rawSegmentProgress - currentSegment;
            if (totalProgress === 1) localProgress = 1;

            // Apply the new path data
            const newD = interpolators[currentSegment](localProgress);
            document.getElementById('morph-path').setAttribute('d', newD);
        }

        // Start the process
        loadSVGs();
    </script>
</body>
</html>
