<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Aid Guide</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .gallery-container {
            width: 100%;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 1100px;
            display: block;
            margin-bottom: 40px; 
            border-radius: 12px;
            transition: transform 0.3s ease-in-out;
        }

        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="gallery-container" id="gallery">
        <img src="fa01.jpg" alt="First Aid Principle and Victim Assessment">
        <img src="fa02.jpg" alt="Victim Assessment and Vital Signs">
        <img src="fa03.jpg" alt="ABCDE Assessment Method">
        <img src="fa04.jpg" alt="Suffocation and Choking">
        <img src="fa05.jpg" alt="Choking Causes and Symptoms">
        <img src="fa06.jpg" alt="Choking Treatment Flowchart">
        <img src="fa07.jpg" alt="Wounds and Bandaging">
        <img src="fa09.jpg" alt="Wound Care and Dressings">
        <img src="fa08.jpg" alt="Bandaging Techniques">
    </div>

    <script>
        // 1. Set your speed (Higher = Faster)
        let scrollSpeed = 1; 

        function autoScroll() {
            // 2. Perform the scroll without checking for hover/pause
            window.scrollBy(0, scrollSpeed);

            // 3. Loop back to top logic
            // Using >= (document.body.offsetHeight - 2) helps account for sub-pixel rounding
            if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2) {
                window.scrollTo(0, 0);
            }

            // 4. Smooth recursive call for high-performance animation
            requestAnimationFrame(autoScroll);
        }

        // Initialize on load
        window.onload = autoScroll;
    </script>
</body>
</html>
