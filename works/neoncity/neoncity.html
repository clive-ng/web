<script>
        const modelViewer = document.querySelector("#spinningModel");
        const container = document.querySelector("#container");
        const pageLoader = document.querySelector("#page-loader");
        const loaderPercentage = document.querySelector("#loader-percentage");

        // Helper function to hide the loader
        function hideLoader() {
            if (!pageLoader.classList.contains("loader-hidden")) {
                pageLoader.classList.add("loader-hidden");
            }
        }

        // --- LOADER LOGIC ---
        // 1. Listen for normal loading progress
        modelViewer.addEventListener("progress", (event) => {
            const progress = Math.round(event.detail.totalProgress * 100);
            
            // Only update text if it's a valid number (sometimes it returns NaN initially)
            if (!isNaN(progress)) {
                loaderPercentage.textContent = `${progress}%`;
            }
            
            // Hide the loader when fully loaded
            if (event.detail.totalProgress === 1) {
                setTimeout(hideLoader, 300);
            }
        });

        // 2. FAIL-SAFE: If the 3D model file is missing or broken
        modelViewer.addEventListener("error", (error) => {
            console.error("Error loading 3D model:", error);
            loaderPercentage.textContent = "Skipping 3D...";
            setTimeout(hideLoader, 800); // Hide loader anyway so the site remains usable
        });

        // 3. FAIL-SAFE: Absolute Timeout
        // If 8 seconds pass and the loader is still on screen, force it to hide.
        setTimeout(() => {
            hideLoader();
        }, 8000);

        // --- SCROLL LOGIC ---
        window.addEventListener("scroll", () => {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollFraction = scrollTop / scrollHeight;

            // 1. Logic for 3D Camera 
            const journeyFraction = Math.min(scrollTop / (window.innerHeight * 5), 1);
            
            let theta, phi, radius;
            const startTheta = 315; 

            if (journeyFraction <= 0.33) {
                const p1 = journeyFraction / 0.33;
                theta = startTheta + (p1 * 45); 
                phi = 45;
                radius = 100 - (p1 * 20); 
            } else if (journeyFraction <= 0.66) {
                const p2 = (journeyFraction - 0.33) / 0.33;
                theta = startTheta + 45; 
                phi = 45 + (p2 * 45);
                radius = 80 - (p2 * 40); 
            } else {
                const p3 = (journeyFraction - 0.66) / 0.34;
                theta = (startTheta + 45) - (p3 * 45); 
                phi = 90 - (p3 * 45);
                radius = 40 + (p3 * 60); 
            }

            modelViewer.cameraOrbit = `${theta}deg ${phi}deg ${radius}%`;

            // 2. Hide 3D model once we scroll deep into the gallery
            if (scrollTop > window.innerHeight * 6) {
                container.style.display = "none";
            } else {
                container.style.display = "block";
            }
        });
    </script>
