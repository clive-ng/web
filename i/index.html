<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side-by-Side Image Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='8' ry='8' stroke='%23CBD5E1FF' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            transition: all 0.2s ease;
        }
        .drag-over {
            background-color: #f1f5f9;
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='8' ry='8' stroke='%233b82f6' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e") !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-slate-800">Auto Image Merger</h1>
            <p class="text-slate-500">Upload both images to auto-download. Starts from <b>o0215.jpg</b></p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-700">Left Image (Part A)</label>
                <div id="dropzoneA" class="relative group dashed-border rounded-xl bg-white h-64 overflow-hidden" 
                     ondragover="handleDragOver(event, 'A')" 
                     ondragleave="handleDragLeave(event, 'A')" 
                     ondrop="handleDrop(event, 'A')">
                    
                    <input type="file" id="inputA" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleUpload('A')">
                    
                    <div id="previewA-container" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 pointer-events-none">
                        <i data-lucide="image-plus" class="w-10 h-10 text-slate-400 mb-3"></i>
                        <p class="text-sm text-slate-500 font-medium">Click or Drag Image A</p>
                    </div>
                    
                    <img id="previewA-img" class="absolute inset-0 w-full h-full object-contain rounded-xl bg-slate-100 hidden pointer-events-none" />
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-700">Right Image (Part B)</label>
                <div id="dropzoneB" class="relative group dashed-border rounded-xl bg-white h-64 overflow-hidden"
                     ondragover="handleDragOver(event, 'B')" 
                     ondragleave="handleDragLeave(event, 'B')" 
                     ondrop="handleDrop(event, 'B')">
                    
                    <input type="file" id="inputB" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleUpload('B')">
                    
                    <div id="previewB-container" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 pointer-events-none">
                        <i data-lucide="image-plus" class="w-10 h-10 text-slate-400 mb-3"></i>
                        <p class="text-sm text-slate-500 font-medium">Click or Drag Image B</p>
                    </div>
                    
                    <img id="previewB-img" class="absolute inset-0 w-full h-full object-contain rounded-xl bg-slate-100 hidden pointer-events-none" />
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center space-x-6">
                   <label class="flex items-center space-x-2 text-sm text-slate-600 cursor-pointer">
                        <input type="checkbox" id="matchHeight" class="w-4 h-4 text-blue-600 rounded border-gray-300" checked onchange="mergeImages()">
                        <span>Auto-scale height</span>
                   </label>
                   <div class="flex items-center space-x-2">
                       <span class="text-xs font-semibold text-slate-500 uppercase">Start Number:</span>
                       <input type="number" id="startNumber" value="215" class="w-20 px-2 py-1 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none" onchange="updateCounter(this.value)">
                   </div>
                </div>
                
                <button onclick="resetAll()" class="px-5 py-2.5 rounded-lg text-sm text-red-600 hover:bg-red-50 transition-all flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear All
                </button>
            </div>

            <div id="resultContainer" class="hidden">
                 <canvas id="mergeCanvas" class="hidden"></canvas>
                 <div class="p-4 bg-green-50 text-green-700 rounded-lg text-center text-sm font-medium">
                     Processing and downloading next file...
                 </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let imageA = null, imageB = null;
        let currentCounter = 215;

        function handleDragOver(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.add('drag-over');
        }

        function handleDragLeave(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.remove('drag-over');
        }

        function handleDrop(e, side) {
            e.preventDefault();
            document.getElementById(`dropzone${side}`).classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const input = document.getElementById(`input${side}`);
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(files[0]);
                input.files = dataTransfer.files;
                handleUpload(side);
            }
        }

        function updateCounter(val) {
            currentCounter = parseInt(val) || 0;
        }

        function handleUpload(side) {
            const input = document.getElementById(`input${side}`);
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (side === 'A') imageA = img; else imageB = img;

                    const previewImg = document.getElementById(`preview${side}-img`);
                    previewImg.src = e.target.result;
                    previewImg.classList.remove('hidden');
                    document.getElementById(`preview${side}-container`).classList.add('opacity-0');

                    // If both images are present, trigger merge and auto-download
                    if (imageA && imageB) {
                        mergeAndAutoDownload();
                    }
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function mergeAndAutoDownload() {
            const canvas = document.getElementById('mergeCanvas');
            const ctx = canvas.getContext('2d');
            const matchHeight = document.getElementById('matchHeight').checked;

            let w1 = imageA.width, h1 = imageA.height;
            let w2 = imageB.width, h2 = imageB.height;

            if (matchHeight) {
                const targetH = Math.max(h1, h2);
                w1 = w1 * (targetH / h1);
                w2 = w2 * (targetH / h2);
                h1 = h2 = targetH;
            }

            canvas.width = w1 + w2;
            canvas.height = Math.max(h1, h2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imageA, 0, 0, w1, h1);
            ctx.drawImage(imageB, w1, 0, w2, h2);

            // Prepare Filename: prefix 'o' + 4-digit padded number
            const paddedNumber = currentCounter.toString().padStart(4, '0');
            const filename = `o${paddedNumber}.jpg`;

            // Download
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/jpeg", 0.92);
            link.download = filename;
            link.click();

            // Increment Counter
            currentCounter++;
            document.getElementById('startNumber').value = currentCounter;

            // Auto-Reset inputs for the next batch
            setTimeout(() => {
                resetInputsOnly();
            }, 500);
        }

        function resetInputsOnly() {
            imageA = null; imageB = null;
            document.getElementById('inputA').value = "";
            document.getElementById('inputB').value = "";
            document.getElementById('previewA-img').classList.add('hidden');
            document.getElementById('previewB-img').classList.add('hidden');
            document.getElementById('previewA-container').classList.remove('opacity-0');
            document.getElementById('previewB-container').classList.remove('opacity-0');
        }

        function resetAll() {
            resetInputsOnly();
            currentCounter = 215;
            document.getElementById('startNumber').value = 215;
        }
    </script>
</body>
</html>
